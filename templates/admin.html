<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

<h2>Admin Dashboard</h2>

<a href="/logout">

Logout

</a>

<hr>

<form
action="/add_product"
method="POST">

<input
type="text"
name="name"
placeholder="Product Name"
required>

<textarea
name="description"
placeholder="Description">
</textarea>

<input
type="number"
step="0.01"
name="price"
placeholder="Price"
required>

<button>

Add Product

</button>

</form>

<hr>

<table>

<tr>

<th>Name</th>

<th>Description</th>

<th>Price</th>

</tr>

{% for product in products %}

<tr>

<td>{{ product[1] }}</td>

<td>{{ product[2] }}</td>

<td>₹ {{ product[3] }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
