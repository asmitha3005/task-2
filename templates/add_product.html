<!DOCTYPE html>
<html>
<head>
<title>Add Product</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

<h2>Add Product</h2>

<form action="/add_product" method="POST">

<input
type="text"
name="name"
placeholder="Product Name"
required>

<textarea
name="description"
placeholder="Description">
</textarea>

<input
type="number"
step="0.01"
name="price"
placeholder="Price"
required>

<button>

Add Product

</button>

</form>

<a href="/admin">

Back

</a>

</div>

</body>

</html>
