<!DOCTYPE html>
<html>
<head>
<title>Edit Product</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

<h2>Edit Product</h2>

<form method="POST">

<input
type="text"
name="name"
value="{{ product[1] }}"
required>

<textarea
name="description">{{ product[2] }}</textarea>

<input
type="number"
step="0.01"
name="price"
value="{{ product[3] }}"
required>

<button>

Update Product

</button>

</form>

<br>

<a href="/admin">

Back

</a>

</div>

</body>

</html>
