<!DOCTYPE html>
<html>
<head>
<title>Orders</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

<h2>My Orders</h2>

<table>

<tr>

<th>Order ID</th>

<th>Total</th>

<th>Status</th>

</tr>

{% for order in orders %}

<tr>

<td>{{ order[0] }}</td>

<td>₹ {{ order[2] }}</td>

<td>{{ order[3] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">Continue Shopping</a>

</div>

</body>

</html>
