<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<select name="role">

<option>User</option>

<option>Admin</option>

</select>

<button>

Register

</button>

</form>

<p>

Already Registered?

<a href="/login">

Login

</a>

</p>

</div>

</body>
</html>
