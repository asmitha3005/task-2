<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

<h2>Shopping Cart</h2>

<table>

<tr>
<th>Product</th>
<th>Price</th>
<th>Action</th>
</tr>

{% for item in cart %}

<tr>

<td>{{ item[1] }}</td>

<td>₹ {{ item[2] }}</td>

<td>

<a href="/remove/{{ item[0] }}">
<button>Remove</button>
</a>

</td>

</tr>

{% endfor %}

</table>

<h3>Total: ₹ {{ total }}</h3>

<a href="/checkout">
<button>Checkout</button>
</a>

</div>

</body>
</html>
